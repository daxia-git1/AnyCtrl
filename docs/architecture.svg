<text x="875" y="100" text-anchor="middle" class="annotation-title" fill="white">设置驱动机制</text>
<text x="784" y="122" class="annotation-title" fill="#c2410c">协议切换</text>
<text x="788" y="143" class="annotation-text">○ HTTP (REST API)</text>
<text x="788" y="159" class="annotation-text">○ WebSocket (长连接)</text>
<text x="788" y="175" class="annotation-text">○ MQTT (发布/订阅)</text>
<text x="784" y="197" class="annotation-title" fill="#c2410c">数据模式</text>
<text x="788" y="218" class="annotation-text">◉ Mock 模拟数据</text>
<text x="788" y="234" class="annotation-text">○ Real 真实接口</text>
<text x="784" y="256" class="annotation-title" fill="#c2410c">切换流程</text>
<text x="788" y="277" class="annotation-text">1. 用户修改设置</text>
<text x="788" y="293" class="annotation-text">2. Store 更新状态</text>
<text x="788" y="309" class="annotation-text">3. 销毁旧适配器</text>
<text x="788" y="325" class="annotation-text">4. Factory 创建新适配器</text>
<text x="788" y="341" class="annotation-text">5. MockInterceptor 包装</text>
<text x="788" y="357" class="annotation-text">6. 自动重新连接</text>
